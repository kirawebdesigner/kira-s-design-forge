<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="../assets/kirubel-mark.svg" type="image/svg+xml">
  <meta name="robots" content="noindex">
  <title>Page Not Found — Kirubel Daniel</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f7f4ef;color:#111;font-family:Arial,Helvetica,sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:32px}
    section{max-width:760px;text-align:center}p{font-size:18px;line-height:1.6;color:#4d4b47}
    h1{font-size:clamp(72px,16vw,180px);line-height:.85;letter-spacing:-.07em;margin:0 0 30px}
    a{display:inline-flex;align-items:center;min-height:48px;padding:0 22px;border-radius:999px;background:#111;color:#fff;text-decoration:none}
  </style>

<style id="kirubel-portfolio-polish">
#template-overlay, #__framer-editorbar, [href*="framer.link"] { display:none !important; }
.framer-text span[style*="opacity:0.001"] {
  opacity:1 !important;
  filter:none !important;
  transform:none !important;
}
.kirubel-live-link {
  display:inline-flex;
  align-items:center;
  min-height:44px;
  padding:0 18px;
  border:1px solid rgba(17,17,17,.28);
  border-radius:999px;
  white-space:nowrap;
  color:#111;
  text-decoration:none;
  font:500 14px/1 Archivo,Arial,sans-serif;
  transition:background .2s ease,color .2s ease,transform .2s ease;
}
.kirubel-live-link:hover { background:#111;color:#fff;transform:translateY(-2px); }
.kirubel-menu {
  position:fixed;
  inset:0;
  z-index:2147483000;
  display:grid;
  place-items:center;
  padding:24px;
  background:rgba(17,17,17,.72);
  backdrop-filter:blur(14px);
  opacity:0;
  pointer-events:none;
  transition:opacity .22s ease;
}
.kirubel-menu[data-open="true"] { opacity:1;pointer-events:auto; }
.kirubel-menu__panel {
  width:min(520px,100%);
  padding:24px;
  border-radius:24px;
  background:#faf7f3;
  box-shadow:0 24px 80px rgba(0,0,0,.28);
  transform:translateY(16px) scale(.98);
  transition:transform .22s ease;
}
.kirubel-menu[data-open="true"] .kirubel-menu__panel { transform:none; }
.kirubel-menu__top { display:flex;align-items:center;justify-content:space-between;margin-bottom:28px; }
.kirubel-menu__brand { font:700 22px/1 Archivo,Arial,sans-serif; }
.kirubel-menu__close {
  width:44px;height:44px;border:0;border-radius:12px;background:#111;color:#fff;
  font-size:22px;cursor:pointer;
}
.kirubel-menu nav { display:grid;gap:10px; }
.kirubel-menu nav a {
  display:flex;align-items:center;justify-content:space-between;min-height:58px;padding:0 18px;
  border:1px solid rgba(17,17,17,.13);border-radius:14px;color:#111;text-decoration:none;
  font:600 18px/1 Archivo,Arial,sans-serif;transition:background .18s ease,color .18s ease;
}
.kirubel-menu nav a:hover,.kirubel-menu nav a:focus-visible { background:#111;color:#fff;outline:none; }
.kirubel-menu__contact { margin-top:18px;color:#555;font:400 14px/1.5 Archivo,Arial,sans-serif; }
.kirubel-menu__contact a { color:inherit; }
@keyframes kirubel-rise {
  from { opacity:0;transform:translateY(18px); }
  to { opacity:1;transform:none; }
}
main h1, main section > div { animation:kirubel-rise .65s cubic-bezier(.2,.75,.2,1) both; }
@media (prefers-reduced-motion:reduce) {
  *,*::before,*::after { scroll-behavior:auto !important;animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important; }
}
img[src*="assets/projects"] { object-position:center; }
img[src*="fullpage"] {
  height:min(72vh,760px) !important;
  object-fit:cover !important;
  object-position:top center !important;
  transition:object-position 8s cubic-bezier(.2,.75,.2,1) !important;
}
@media (hover:hover) {
  img[src*="fullpage"]:hover { object-position:bottom center !important; }
}
a[href="#contact"] { cursor:pointer; }
@media (max-width:809px) {
  img[src*="discover-mobile"], img[src*="dentalcare-admin-dashboard"] { object-fit:contain !important; }
}
</style>
<script id="kirubel-portfolio-interactions">
document.addEventListener("DOMContentLoaded", () => {
  const pathParts = location.pathname.split("/").filter(Boolean);
  if (pathParts.at(-1)?.includes(".")) pathParts.pop();
  const rootPrefix = "../".repeat(pathParts.length);
  const homeHref = `${rootPrefix}index.html`;
  const projectsHref = `${rootPrefix}work/index.html`;
  const overlay = document.createElement("div");
  overlay.className = "kirubel-menu";
  overlay.setAttribute("role", "dialog");
  overlay.setAttribute("aria-modal", "true");
  overlay.setAttribute("aria-label", "Portfolio navigation");
  overlay.dataset.open = "false";
  overlay.innerHTML = `
    <div class="kirubel-menu__panel">
      <div class="kirubel-menu__top">
        <span class="kirubel-menu__brand">Kirubel Daniel</span>
        <button class="kirubel-menu__close" type="button" aria-label="Close navigation">×</button>
      </div>
      <nav aria-label="Main navigation">
        <a href="${homeHref}">Home <span>↗</span></a>
        <a href="${projectsHref}">Projects <span>↗</span></a>
        <a href="${homeHref}#contact">Contact <span>↗</span></a>
      </nav>
      <p class="kirubel-menu__contact">Addis Ababa, Ethiopia · <a href="mailto:contact@kiraweb.pro.et">contact@kiraweb.pro.et</a></p>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => {
    overlay.dataset.open = "false";
    document.body.style.overflow = "";
  };
  const open = () => {
    overlay.dataset.open = "true";
    document.body.style.overflow = "hidden";
    overlay.querySelector(".kirubel-menu__close").focus();
  };
  overlay.querySelector(".kirubel-menu__close").addEventListener("click", close);
  overlay.addEventListener("click", (event) => { if (event.target === overlay) close(); });
  document.addEventListener("keydown", (event) => { if (event.key === "Escape") close(); });
  const menuTriggers = [...document.querySelectorAll('[data-framer-name="Variant 1"][data-highlight="true"]')]
    .filter((element) => element.querySelector('[data-framer-name="Line"]'));
  menuTriggers.forEach((trigger) => {
    trigger.setAttribute("role", "button");
    trigger.setAttribute("aria-label", "Open navigation");
    trigger.setAttribute("tabindex", "0");
    trigger.addEventListener("click", open);
    trigger.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") { event.preventDefault(); open(); }
    });
  });
  document.querySelectorAll("form").forEach((form) => {
    form.querySelectorAll("input, textarea, select").forEach((field) => {
      if (
        field.getAttribute("aria-hidden") !== "true" &&
        !field.getAttribute("aria-label") &&
        !field.labels?.length
      ) {
        field.setAttribute("aria-label", field.placeholder || field.name || "Form field");
      }
    });
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const fields = [...form.querySelectorAll("input, textarea")];
      const valueFor = (pattern) => fields.find((field) =>
        pattern.test(`${field.name || ""} ${field.placeholder || ""}`)
      )?.value?.trim() || "";
      const name = valueFor(/name/i);
      const email = valueFor(/email/i);
      const project = valueFor(/project|message|details/i);
      const subject = encodeURIComponent(`Portfolio inquiry${name ? ` from ${name}` : ""}`);
      const body = encodeURIComponent(
        `Name: ${name || "Not provided"}\nEmail: ${email || "Not provided"}\n\nProject:\n${project || "I would like to discuss a project."}`
      );
      window.location.href = `mailto:contact@kiraweb.pro.et?subject=${subject}&body=${body}`;
    });
  });
});
</script>
<link rel="stylesheet" href="../assets/portfolio-restoration.css"/>
</head>
<body><main><section><h1><span aria-hidden="true">404</span><span class="portfolio-404-label">Page not found</span></h1><p>That page isn’t here. The products and case studies are still one step away.</p><a href="/">Return to the portfolio</a></section></main><script src="../assets/portfolio-restoration.js" defer></script></body>
</html>
